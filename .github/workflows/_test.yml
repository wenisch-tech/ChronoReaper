name: Test

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_pull_request:
        required: false
        type: boolean
        default: false

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Run tests and coverage verification
        run: mvn -B verify

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-and-coverage-reports
          path: |
            target/surefire-reports/*.xml
            target/site/jacoco/jacoco.xml
            target/site/jacoco/index.html

      - name: Generate coverage summary
        if: always() && inputs.is_pull_request
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: target/site/jacoco/jacoco.xml
          format: markdown
          output: both
          indicators: true
          fail_below_min: false

      - name: Add coverage summary to pull request
        if: always() && inputs.is_pull_request
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Build JAR
        run: mvn -B -DskipTests package
